version: '3.8'

services:
  ml-service:
    build: ./backend/ml-service
    container_name: saathi-ml
    ports:
      - "8000:8000"
    restart: always

  api-server:
    build: ./backend/api-server
    container_name: saathi-api
    ports:
      - "5000:5000"
    environment:
      - ML_SERVICE_URL=http://saathi-ml:8000
    depends_on:
      - ml-service
    restart: always

  frontend:
    build: ./frontend
    container_name: saathi-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/inventory
    depends_on:
      - api-server
    restart: always
