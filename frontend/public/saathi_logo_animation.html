<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saathi Logo Animation</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #ffffff;
    }
    svg {
      max-width: 600px;
      width: 100%;
    }
  </style>
</head>
<body>
<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Saathi animated logo</title>
  <desc>Animated Saathi logo with two characters hugging in a heart shape, with sparkles and a gentle pulse</desc>

  <defs>
    <style>
      @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        10% { transform: scale(1.07); }
        20% { transform: scale(0.97); }
        30% { transform: scale(1.05); }
        40% { transform: scale(1); }
      }
      @keyframes sparkle1 {
        0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
        20%, 80% { opacity: 1; transform: scale(1) rotate(45deg); }
        50% { transform: scale(1.3) rotate(90deg); }
      }
      @keyframes sparkle2 {
        0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
        30%, 70% { opacity: 1; transform: scale(1) rotate(-45deg); }
        50% { transform: scale(1.2) rotate(-90deg); }
      }
      @keyframes sparkle3 {
        0%, 100% { opacity: 0; transform: scale(0); }
        40%, 60% { opacity: 1; transform: scale(1) rotate(20deg); }
      }
      @keyframes floatUp {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes fadeInText {
        0% { opacity: 0; transform: translateY(12px); }
        100% { opacity: 1; transform: translateY(0); }
      }
    </style>

    <radialGradient id="heartGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4ECFB0"/>
      <stop offset="60%" stop-color="#1D9E75"/>
      <stop offset="100%" stop-color="#0F6E56"/>
    </radialGradient>
    <radialGradient id="heartGrad2" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#7ADFC4"/>
      <stop offset="100%" stop-color="#2BB89A"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F8F3"/>
    </radialGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F6E56" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Glow behind heart -->
  <circle cx="340" cy="215" r="110" fill="#1D9E75" opacity="0.15">
    <animate attributeName="r" values="110;125;110" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.28;0.15" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Main floating group -->
  <g style="transform-origin: 340px 215px; animation: floatUp 3.5s ease-in-out infinite;">

    <!-- Heart body -->
    <g style="transform-origin: 340px 230px; animation: heartbeat 2.4s ease-in-out infinite; filter: url(#softShadow);">

      <circle cx="302" cy="195" r="72" fill="url(#heartGrad)"/>
      <circle cx="378" cy="195" r="72" fill="url(#heartGrad)"/>
      <polygon points="230,230 450,230 340,340" fill="url(#heartGrad)"/>
      <rect x="230" y="195" width="220" height="50" fill="url(#heartGrad)"/>
      <ellipse cx="340" cy="195" rx="85" ry="50" fill="url(#heartGrad2)" opacity="0.45"/>

      <!-- Wrap/hug element -->
      <path d="M255 250 Q240 290 270 310 Q310 335 340 320 Q370 335 410 310 Q440 290 425 250" fill="#2BB89A" opacity="0.7"/>
      <path d="M270 260 Q260 290 280 305 Q310 325 340 315" fill="none" stroke="#7ADFC4" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

      <!-- Left character face -->
      <g>
        <circle cx="310" cy="210" r="38" fill="url(#faceGrad)" stroke="#C8EEE3" stroke-width="1.5"/>
        <ellipse cx="299" cy="204" rx="4" ry="5" fill="#1D5C45">
          <animate attributeName="ry" values="5;5;5;5;5;1;5;5;5;5;5;5" dur="4s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="316" cy="204" rx="4" ry="5" fill="#1D5C45">
          <animate attributeName="ry" values="5;5;5;5;5;1;5;5;5;5;5;5" dur="4s" repeatCount="indefinite"/>
        </ellipse>
        <path d="M300 217 Q310 225 320 217" stroke="#1D5C45" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="291" cy="218" rx="6" ry="3.5" fill="#F4A5B8" opacity="0.5"/>
        <ellipse cx="329" cy="218" rx="6" ry="3.5" fill="#F4A5B8" opacity="0.5"/>
      </g>

      <!-- Right character face -->
      <g>
        <circle cx="370" cy="210" r="38" fill="url(#faceGrad)" stroke="#C8EEE3" stroke-width="1.5"/>
        <ellipse cx="359" cy="204" rx="4" ry="5" fill="#1D5C45">
          <animate attributeName="ry" values="5;5;5;5;5;5;5;1;5;5;5;5" dur="4.5s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="376" cy="204" rx="4" ry="5" fill="#1D5C45">
          <animate attributeName="ry" values="5;5;5;5;5;5;5;1;5;5;5;5" dur="4.5s" repeatCount="indefinite"/>
        </ellipse>
        <path d="M360 217 Q370 225 380 217" stroke="#1D5C45" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="351" cy="218" rx="6" ry="3.5" fill="#F4A5B8" opacity="0.5"/>
        <ellipse cx="389" cy="218" rx="6" ry="3.5" fill="#F4A5B8" opacity="0.5"/>
      </g>

    </g>

    <!-- Sparkles -->
    <g style="transform-origin: 285px 155px; animation: sparkle1 2.8s ease-in-out infinite 0.2s;">
      <path d="M285 143 L287.5 153 L298 155 L287.5 157 L285 167 L282.5 157 L272 155 L282.5 153 Z" fill="#2DD4AF"/>
    </g>
    <g style="transform-origin: 400px 148px; animation: sparkle2 2.8s ease-in-out infinite 0.8s;">
      <path d="M400 136 L402.5 146 L413 148 L402.5 150 L400 160 L397.5 150 L387 148 L397.5 146 Z" fill="#4ECFB0"/>
    </g>
    <g style="transform-origin: 418px 168px; animation: sparkle3 2.8s ease-in-out infinite 1.4s;">
      <path d="M418 161 L419.5 166 L425 168 L419.5 170 L418 175 L416.5 170 L411 168 L416.5 166 Z" fill="#9FE1CB"/>
    </g>
    <g style="transform-origin: 268px 172px; animation: sparkle1 2.8s ease-in-out infinite 2s;">
      <path d="M268 165 L269.5 170 L275 172 L269.5 174 L268 179 L266.5 174 L261 172 L266.5 170 Z" fill="#9FE1CB"/>
    </g>

  </g>

  <!-- Saathi text -->
  <text
    x="340" y="410"
    text-anchor="middle"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="72"
    font-weight="700"
    fill="#0F6E56"
    style="animation: fadeInText 1s ease-out 0.3s both; letter-spacing: -1px;">
    Saathi
  </text>

</svg>
</body>
</html>
